<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>País</title>
</head>
<body>
    <h1>Seu país</h1>
    Digite o seu país: <input type="text" name="txtpais" id="txtpais">
    <input type="submit" value="Enviar" onclick="verificar ()">
    <div id="res">

    </div>
    <script>
        function verificar(){
            var pais = document.getElementById('txtpais')
            var res = document.getElementById('res')
            var valor = (pais.value)
            if (valor == 'Brasil'){
                res.innerHTML = '<p>Você é brasileiro</p>'
            }else {
                res.innerHTML += '<p>Você é estrangeiro</p>'
            }
        }
    </script>
</body>
</html>
