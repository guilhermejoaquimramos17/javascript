<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>
    <section>
        <div id="inf">
            <label for="ini">Início: </label>
            <input type="number" name="inicio" id="ini"> <br>
            <label for="fim">Fim: </label>
            <input type="number" name="fim" id="fim"> <br>
            <label for="passo">Passo: </label>
            <input type="number" name="passo" id="passo"> <br>
            <input type="submit" value="Contar" onclick="contar()">
        </div>
        <div id="res">
            <p>Preparando a contagem...</p>
        </div>
    </section>
    <footer>
        <p>&copy; CursoemVídeo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
