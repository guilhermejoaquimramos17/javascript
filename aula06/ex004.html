<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>
<body>
    
    <script>
       var nome = window.prompt('Qual o seu nome?')
       var salario = window.prompt('Qual seu salário?')
        document.write(`Seu nome tem ${nome.length} letras.</br>`)
        document.write(`Seu nome em maiúsculas é: ${nome.toUpperCase()}.</br>`)
        document.write(`Seu nome em minúsculas é: ${nome.toLowerCase()}</br>`)
        document.write(`Seu salário é ${salario}`)
        // document.write('Seu nome tem ' + nome.length + ' letras.')
    </script>
</body>
</html>
